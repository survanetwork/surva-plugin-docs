name: Build and deploy the website
on: [push]
jobs:
    build:
        name: Build Docusaurus project
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Setup Pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Docusaurus .docusaurus folder cache
              id: cache-docusaurus-cache
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
              with:
                  path: .docusaurus
                  key: ${{ runner.os }}-docusaurus-cache

            - name: Docusaurus build folder cache
              id: cache-docusaurus-build
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
              with:
                  path: build
                  key: ${{ runner.os }}-docusaurus-build

            - name: Build Docusaurus page
              run: pnpm run build
              env:
                  UMAMI_HOST: https://umami.yellowlake.net
                  UMAMI_ID: a30ae129-e24f-490e-b4ea-3cd30e4fa743

            - name: Save build output
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: docusau-build-out
                  path: build
    deploy:
        name: Deploy static website to S3
        if: github.ref == 'refs/heads/main'
        needs: build
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Restore build output
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: docusau-build-out
                  path: build

            - name: Configure AWS
              uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: eu-central-1

            - name: Upload to AWS S3
              run: aws s3 sync build s3://plugin-docs.surva.net --delete
